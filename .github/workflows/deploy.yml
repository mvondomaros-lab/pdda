name: Build & Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "deploy"
  cancel-in-progress: true

env:
  ORG: mvondomaros-lab
  PAGES_REPO: mvondomaros-lab.github.io
  BRANCH_PREFIX: publish/pdda

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.9.6
        with:
          pixi-version: v0.70.2
          cache: true
          cache-write: >-
            ${{ github.event_name == 'push' && github.ref_name == 'main' }}

      - name: Install Pixi environment
        run: pixi install --locked

      - name: Build artifacts
        run: pixi run build-artifacts

      - name: Push to Pages Repo
        env:
          PAGES_PUSH_TOKEN: ${{ secrets.PAGES_PUSH_TOKEN }}
        run: |
          set -euo pipefail

          SHORT_SHA="${GITHUB_SHA::7}"

          test -n "${PAGES_PUSH_TOKEN}" || {
            echo "PAGES_PUSH_TOKEN is not set"
            exit 1
          }

          BRANCH="${BRANCH_PREFIX}-${GITHUB_REF_NAME}-${GITHUB_RUN_ID}-${SHORT_SHA}"

          git clone \
            "https://x-access-token:${PAGES_PUSH_TOKEN}@github.com/${ORG}/${PAGES_REPO}.git" \
            pages
          cd pages
          git checkout -b "$BRANCH"

          mkdir -p pypi conda
          rsync -av ../out/pypi/ pypi/
          rsync -av ../out/conda/ conda/

          git add pypi conda

          if git diff --cached --quiet; then
            echo "No artifact changes to publish"
            exit 0
          fi

          git commit -m "pdda: publish ${GITHUB_REF_NAME} (${GITHUB_SHA})"
          git push -u origin HEAD

      - name: Open PR to Pages Repo
        env:
          GH_TOKEN: ${{ secrets.PAGES_PUSH_TOKEN }}
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"

          BRANCH="${BRANCH_PREFIX}-${GITHUB_REF_NAME}-${GITHUB_RUN_ID}-${SHORT_SHA}"

          gh pr create \
            --repo "${ORG}/${PAGES_REPO}" \
            --title "Publish pdda ${GITHUB_REF_NAME}" \
            --body "Adds new artifacts from ${GITHUB_REPOSITORY} @ ${GITHUB_SHA}." \
            --base main \
            --head "$BRANCH"