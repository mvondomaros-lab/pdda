name: Build & Deploy

on:
  push:
    branches: [ main, dev ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "deploy-${{ github.ref_name }}"
  cancel-in-progress: true

env:
  ORG: mvondomaros-lab
  PAGES_REPO: mvondomaros-lab.github.io
  BRANCH_PREFIX: publish/pdda

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.9.4

      - name: Build Artifacts
        run: |
          pixi install
          pixi build
          pixi run hatch build

      - name: Stage Artifacts
        run: |
          set -euo pipefail
          shopt -s nullglob

          mkdir -p out/conda/noarch out/pypi

          conda_pkgs=( *.conda )
          wheels=( dist/*.whl )
          sdists=( dist/*.tar.gz )

          if (( ${#conda_pkgs[@]} == 0 )); then
            echo "No .conda artifacts found"
            exit 1
          fi

          if (( ${#wheels[@]} + ${#sdists[@]} == 0 )); then
            echo "No PyPI artifacts found"
            exit 1
          fi

          cp -v "${conda_pkgs[@]}" out/conda/noarch/
          cp -v "${wheels[@]}" "${sdists[@]}" out/pypi/

      - name: Dry-run summary
        if: github.ref_name != 'main'
        run: |
          echo "Dry run only for branch: ${GITHUB_REF_NAME}"
          echo "Would publish these artifacts:"
          find out -type f -print

      - name: Prepare Git Identity
        if: github.ref_name == 'main'
        run: |
          git config --global user.name  "mvondomaros-lab-bot"
          git config --global user.email "actions@github.com"

      - name: Push to Pages Repo
        if: github.ref_name == 'main'
        env:
          PAGES_PUSH_TOKEN: ${{ secrets.PAGES_PUSH_TOKEN }}
        run: |
          set -euo pipefail

          test -n "${PAGES_PUSH_TOKEN}" || {
            echo "PAGES_PUSH_TOKEN is not set"
            exit 1
          }

          BRANCH="${BRANCH_PREFIX}-${GITHUB_REF_NAME}-${GITHUB_RUN_ID}-${GITHUB_SHA::7}"

          git clone "https://x-access-token:${PAGES_PUSH_TOKEN}@github.com/${ORG}/${PAGES_REPO}.git" pages
          cd pages
          git checkout -b "$BRANCH"

          mkdir -p pypi conda
          rsync -av ../out/pypi/ pypi/
          rsync -av ../out/conda/ conda/

          git add pypi conda

          if git diff --cached --quiet; then
            echo "No artifact changes to publish"
            exit 0
          fi

          git commit -m "sjobs: publish ${GITHUB_REF_NAME} (${GITHUB_SHA})"
          git push -u origin HEAD

      - name: Open PR to Pages Repo
        if: github.ref_name == 'main'
        env:
          GH_TOKEN: ${{ secrets.PAGES_PUSH_TOKEN }}
        run: |
          BRANCH="${BRANCH_PREFIX}-${GITHUB_REF_NAME}-${GITHUB_RUN_ID}-${GITHUB_SHA::7}"

          gh pr create \
            --repo "${ORG}/${PAGES_REPO}" \
            --title "Publish sjobs ${GITHUB_REF_NAME}" \
            --body "Adds new artifacts from ${GITHUB_REPOSITORY} @ ${GITHUB_SHA}.\n" \
            --base main \
            --head "$BRANCH"